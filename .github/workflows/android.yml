name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Android Project Structure
      run: |
        mkdir -p app/src/main/java/com/example/netlifyapp
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

    - name: Create AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.netlifyapp">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:label="My Netlify App"
                android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
                android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create MainActivity.java
      run: |
        cat << 'EOF' > app/src/main/java/com/example/netlifyapp/MainActivity.java
        package com.example.netlifyapp;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;

        public class MainActivity extends Activity {
            @pragma("android.webkit.WebView")
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState) ;
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                // هنا وضعنا رابط موقعك مباشرة
                webView.loadUrl("https://fluffy-taffy-3bdf81.netlify.app/");
                setContentView(webView);
            }
        }
        EOF

    - name: Create build.gradle
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google() \n mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google() \n mavenCentral() }
        }
        EOF

    - name: Create app/build.gradle
      run: |
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.netlifyapp'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.netlifyapp"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

    - name: Create settings.gradle
      run: echo "include ':app'" > settings.gradle

    - name: Build APK with Gradle
      run: |
        chmod +x /usr/share/gradle/bin/gradle || true
        gradle wrapper --gradle-version 8.5
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-netlify-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
