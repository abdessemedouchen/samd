name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create myapp com.example.netlifyapp "My Netlify App"
        cd myapp
        cordova platform add android
        
    - name: Configure Webview URL
      run: |
        # تغيير الإعدادات لتوجه التطبيق إلى رابط موقعك مباشرة بملء الشاشة
        cd myapp
        sed -i 's|<content src="index.html" />|<content src="https://fluffy-taffy-3bdf81.netlify.app/" />|g' config.xml
        # السماح بالوصول للإنترنت من داخل التطبيق
        sed -i 's|</widget>|    <allow-navigation href="https://fluffy-taffy-3bdf81.netlify.app/*" />\n</widget>|g' config.xml

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd myapp
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-netlify-app-apk
        path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
