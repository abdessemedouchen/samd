name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        # تعيين اسم التطبيق ليصبح samd app
        cordova create myapp com.ouchen.samdapp "samd app"
        cd myapp
        cordova platform add android
        
    - name: Configure Webview, Security and Icon
      run: |
        cd myapp
        # 1. توجيه التطبيق لرابط موقعك على Netlify
        sed -i 's|<content src="index.html" />|<content src="https://fluffy-taffy-3bdf81.netlify-app/" />|g' config.xml
        
        # 2. السماح للتطبيق بفتح الرابط وإخفاء الشاشة الرمادية تماماً (Delay = 0)
        sed -i 's|</widget>|    <allow-navigation href="https://fluffy-taffy-3bdf81.netlify-app/*" />\n    <allow-navigation href="*" />\n    <preference name="SplashScreenDelay" value="0" />\n    <preference name="FadeSplashScreenDuration" value="0" />\n</widget>|g' config.xml
        
        # 3. ربط أيقونتك الخاصة icon-512.png بالتطبيق
        sed -i 's|</widget>|    <icon src="../icon-512.png" />\n</widget>|g' config.xml

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd myapp
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: samd-app-apk
        path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
