name: Build Android APK (Local Files)

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        # إنشاء المشروع باسم samd app
        cordova create myapp com.ouchen.samdapp "samd app"
        cd myapp
        cordova platform add android
        
    - name: Copy Local Web Files into App
      run: |
        # حذف ملفات كوردوفا الترحيبية الافتراضية
        rm -rf myapp/www/*
        
        # نسخ كل ملفات موقعك الحالية (HTML, CSS, JS) إلى داخل مجلد التطبيق الداخلي
        # استثناء مجلد myapp نفسه ومجلدات جيتهاب لكي لا يحدث تكرار
        rsync -av --exclude='myapp' --exclude='.github' --exclude='.git' ./ myapp/www/

    - name: Configure Webview, Security and Icon
      run: |
        cd myapp
        # 1. إجبار التطبيق على فتح ملف index.html الداخلي بدلاً من رابط خارجي
        sed -i 's|<content src="index.html" />|<content src="index.html" />|g' config.xml
        
        # 2. إعدادات الأمان للملفات المحلية وإخفاء الشاشة الرمادية تماماً
        sed -i 's|</widget>|    <preference name="SplashScreenDelay" value="0" />\n    <preference name="FadeSplashScreenDuration" value="0" />\n</widget>|g' config.xml
        
        # 3. ربط أيقونتك الخاصة icon-512.png بالتطبيق
        sed -i 's|</widget>|    <icon src="../icon-512.png" />\n</widget>|g' config.xml

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android APK
      run: |
        cd myapp
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: samd-app-local-apk
        path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
