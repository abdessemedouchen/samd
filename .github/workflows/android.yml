name: Build Android APK

on:
  push:
    branches:
      - main
      - master # يغطي هذا الخيار الكود سواء كان اسم الفرع الرئيسي main أو master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Initialize and Build APK
      run: |
        # استخدام رابط مشروعك الخاص على Netlify مع ملف المانيفست
        bubblewrap init --manifest=https://fluffy-taffy-3bdf81.netlify.app/manifest.json
        bubblewrap build --skipSigning
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: ./*.apk
